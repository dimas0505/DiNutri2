<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiNutri — Gerador de Ícones PWA</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #8A2BE2; }
    button { background: #8A2BE2; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 6px 4px; font-size: 14px; }
    button:hover { background: #6a1fb2; }
    #previews { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
    .preview-item { text-align: center; font-size: 12px; color: #555; }
    canvas { display: block; border: 1px solid #ddd; border-radius: 4px; }
    p { color: #555; }
  </style>
</head>
<body>
  <h1>Gerador de Ícones PWA — DiNutri</h1>
  <p>Este utilitário gera os ícones PNG do aplicativo DiNutri a partir do SVG oficial.
     Os ícones possuem fundo roxo <code>#8A2BE2</code> preenchendo toda a área,
     sem borda ou padding branco, compatível com o padrão <strong>maskable</strong> do PWA.</p>

  <button id="btnGenerateAll">⬇ Baixar todos os ícones</button>
  <button id="btnPreview">👁 Visualizar prévia</button>

  <div id="previews"></div>

  <script>
    const SIZES = [72, 96, 128, 144, 152, 192, 384, 512];
    const BG_COLOR = '#8A2BE2';

    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;

      // Fundo roxo total
      ctx.fillStyle = BG_COLOR;
      ctx.fillRect(0, 0, size, size);

      // Escala relativa ao tamanho do ícone (base 512)
      const scale = size / 512;

      // ── Folha ──
      const cx = size / 2;
      const leafCy = 170 * scale;

      ctx.save();
      ctx.translate(cx, leafCy);

      // Caule
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 8 * scale;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, 60 * scale);
      ctx.lineTo(0, -20 * scale);
      ctx.stroke();

      // Folha
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.beginPath();
      ctx.moveTo(0, -20 * scale);
      ctx.bezierCurveTo(-50 * scale, -70 * scale, -80 * scale, -20 * scale, -40 * scale, 30 * scale);
      ctx.bezierCurveTo(-20 * scale, 55 * scale,  20 * scale,  55 * scale,  40 * scale, 30 * scale);
      ctx.bezierCurveTo( 80 * scale, -20 * scale,  50 * scale, -70 * scale,   0,        -20 * scale);
      ctx.closePath();
      ctx.fill();

      // Nervura central
      ctx.strokeStyle = BG_COLOR;
      ctx.lineWidth = 4 * scale;
      ctx.beginPath();
      ctx.moveTo(0, -20 * scale);
      ctx.bezierCurveTo(0, 10 * scale, 0, 20 * scale, 0, 30 * scale);
      ctx.stroke();

      ctx.restore();

      // ── Texto DiNutri ──
      const fontSize = Math.round(108 * scale);
      ctx.fillStyle = 'white';
      ctx.font = `bold ${fontSize}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('DiNutri', cx, 330 * scale);
    }

    function downloadIcon(size) {
      const canvas = document.createElement('canvas');
      drawIcon(canvas, size);
      const link = document.createElement('a');
      link.download = `icon-${size}x${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    document.getElementById('btnGenerateAll').addEventListener('click', () => {
      SIZES.forEach((size, i) => {
        setTimeout(() => downloadIcon(size), i * 300);
      });
    });

    document.getElementById('btnPreview').addEventListener('click', () => {
      const container = document.getElementById('previews');
      container.innerHTML = '';
      SIZES.forEach((size) => {
        const previewSize = Math.min(size, 128);
        const canvas = document.createElement('canvas');
        drawIcon(canvas, size);

        // Criar preview redimensionado
        const previewCanvas = document.createElement('canvas');
        previewCanvas.width = previewSize;
        previewCanvas.height = previewSize;
        const pCtx = previewCanvas.getContext('2d');
        pCtx.drawImage(canvas, 0, 0, previewSize, previewSize);

        const wrapper = document.createElement('div');
        wrapper.className = 'preview-item';
        wrapper.appendChild(previewCanvas);
        const label = document.createElement('div');
        label.textContent = `${size}×${size}`;
        wrapper.appendChild(label);

        const dlBtn = document.createElement('button');
        dlBtn.textContent = '⬇';
        dlBtn.style.padding = '4px 8px';
        dlBtn.style.margin = '4px 0 0';
        dlBtn.addEventListener('click', () => downloadIcon(size));
        wrapper.appendChild(dlBtn);

        container.appendChild(wrapper);
      });
    });
  </script>
</body>
</html>
